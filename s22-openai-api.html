<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAI API Demo</title>
</head>

<body>
  <button id="ask-ai-btn" type="button">Ask AI</button>
  <p id="result"></p>

    <script src="js/config.js"></script>
    <script>
    const askAiButton = document.getElementById('ask-ai-btn');
    const resultEl = document.getElementById('result');

        async function askAI(prompt) {
      const response = await fetch('https://api.openai.com/v1/responses', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${OPENAI_API_KEY}`
        },
        body: JSON.stringify({
          model: 'gpt-5-nano',
          input: prompt
        })
      });

      if (!response.ok) {
        throw new Error(`Request failed: ${response.status}`);
      }

      const data = await response.json();
      return data.output_text || 'No text returned.';
    }

    askAiButton.addEventListener('click', async () => {
      resultEl.textContent = 'Thinking...';

      try {
        const story = await askAI('Write a one-sentence bedtime story about a unicorn.');
        resultEl.textContent = story;
        console.log(story);
      } catch (error) {
        resultEl.textContent = 'Something went wrong. Check console for details.';
        console.error(error);
      }
    });

    </script>
</body>

</html>
