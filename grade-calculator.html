<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Grade Calculator</title>
</head>
<body>
	<h1>Grade Calculator</h1>

	<input id="scoreInput" type="number" placeholder="Enter score 0-100" />
	<button id="checkBtn">Check Grade</button>

	<p id="result"></p>

	<script>
		function getGrade(score) {
			if (score >= 90) {
				return "A";
			} else if (score >= 80) {
				return "B";
			} else if (score >= 70) {
				return "C";
			} else if (score >= 60) {
				return "D";
			} else {
				return "F";
			}
		}

		var input = document.getElementById("scoreInput");
		var button = document.getElementById("checkBtn");
		var result = document.getElementById("result");

		button.addEventListener("click", function () {
			if (input.value === "") {
				result.textContent = "Please enter a score";
				result.style.color = "black";
				return;
			}

			var score = Number(input.value);

			if (score < 0 || score > 100) {
				result.textContent = "Score must be 0-100";
				result.style.color = "black";
				return;
			}

			var grade = getGrade(score);
			result.textContent = "Grade: " + grade;

			if (grade === "A" || grade === "B") {
				result.style.color = "green";
			} else if (grade === "D" || grade === "F") {
				result.style.color = "red";
			} else {
				result.style.color = "black";
			}
		});
	</script>
</body>
</html>
