<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Playground</title>
	<link rel="icon" href="images/me.jpeg" type="image/jpeg" />
</head>
<body>
	<h1>Simple Playground</h1>

	<h2>YouTube Video</h2>
	<iframe
		width="560"
		height="315"
		src="https://www.youtube.com/embed/dQw4w9WgXcQ"
		title="YouTube video player"
		allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
		referrerpolicy="strict-origin-when-cross-origin"
		allowfullscreen>
	</iframe>

	<h2>Google Map (Babson Campus)</h2>
	<iframe
		src="https://www.google.com/maps?q=Babson+College&output=embed"
		width="600"
		height="450"
		style="border:0;"
		allowfullscreen=""
		loading="lazy"
		referrerpolicy="no-referrer-when-downgrade">
	</iframe>

	<h2>Video</h2>
	<video controls width="400">
		<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
		Your browser does not support the video tag.
	</video>

	<h2>FAQ</h2>
	<details>
		<summary>What is this page?</summary>
		<p>A simple HTML playground with embeds and basic elements.</p>
	</details>
	<details>
		<summary>Where is Babson?</summary>
		<p>Babson College is in Wellesley, Massachusetts.</p>
	</details>

	<h2>Canvas Drawing</h2>
	<canvas id="myCanvas" width="300" height="150"></canvas>

	<script>
		const canvas = document.getElementById('myCanvas');
		const ctx = canvas.getContext('2d');

		ctx.fillStyle = '#87ceeb';
		ctx.fillRect(0, 0, 300, 150);

		ctx.fillStyle = '#228b22';
		ctx.fillRect(0, 110, 300, 40);

		ctx.fillStyle = '#f4c542';
		ctx.beginPath();
		ctx.arc(250, 40, 20, 0, Math.PI * 2);
		ctx.fill();
	</script>
</body>
</html>
