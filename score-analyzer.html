<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .stats p {
      margin: 6px 0;
    }

    .bars {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .label {
      width: 90px;
      font-size: 14px;
    }

    .track {
      flex: 1;
      height: 24px;
      border-radius: 6px;
      background: #f1f1f1;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      color: #fff;
      font-size: 13px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      box-sizing: border-box;
      white-space: nowrap;
    }

    .ab {
      background: #2e7d32;
    }

    .cd {
      background: #ef6c00;
    }

    .f {
      background: #c62828;
    }
  </style>
</head>
<body>
  <h1>Score Analyzer</h1>

  <section class="stats">
    <p id="count"></p>
    <p id="average"></p>
    <p id="highest"></p>
    <p id="lowest"></p>
    <p id="passing"></p>
  </section>

  <h2>Score Bars</h2>
  <section id="bars" class="bars"></section>

  <script>
    const scores = [88, 72, 95, 63, 81, 56, 90];

    function getGrade(score) {
      if (score >= 90) return 'A';
      if (score >= 80) return 'B';
      if (score >= 70) return 'C';
      if (score >= 60) return 'D';
      return 'F';
    }

    function getColorClass(grade) {
      if (grade === 'A' || grade === 'B') return 'ab';
      if (grade === 'C' || grade === 'D') return 'cd';
      return 'f';
    }

    let total = 0;
    let highest = scores[0];
    let lowest = scores[0];
    let passing = 0;

    for (const score of scores) {
      total += score;

      if (score > highest) highest = score;
      if (score < lowest) lowest = score;
      if (score >= 60) passing++;
    }

    const count = scores.length;
    const average = (total / count).toFixed(1);

    document.getElementById('count').textContent = `Total number of scores: ${count}`;
    document.getElementById('average').textContent = `Average: ${average}`;
    document.getElementById('highest').textContent = `Highest: ${highest}`;
    document.getElementById('lowest').textContent = `Lowest: ${lowest}`;
    document.getElementById('passing').textContent = `Passing scores (>= 60): ${passing}`;

    const bars = document.getElementById('bars');

    for (const score of scores) {
      const grade = getGrade(score);

      const row = document.createElement('div');
      row.className = 'row';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = `Score ${score}`;

      const track = document.createElement('div');
      track.className = 'track';

      const bar = document.createElement('div');
      bar.className = `bar ${getColorClass(grade)}`;
      bar.style.width = `${score}%`;
      bar.textContent = `${score}% (${grade})`;

      track.appendChild(bar);
      row.appendChild(label);
      row.appendChild(track);
      bars.appendChild(row);
    }
  </script>
</body>
</html>
