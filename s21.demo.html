<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button>Click</button>
    <p id="result"></p>
    <h2 id="stateName"></h2>
    <p id="governor"></p>
    <ul id="townList"></ul>

    <script>
    const btn = document.querySelector('button');
    const result = document.getElementById('result');
    const stateName = document.getElementById('stateName');
    const governor = document.getElementById('governor');
    const townList = document.getElementById('townList');

    async function getRandomWord() {
        const response = await fetch('https://oim.108122.xyz/words/random');
        const word = await response.json();
        console.log(word); // a random word!
        result.textContent = word;
}
    async function showTowns() {
    const response = await fetch('https://oim.108122.xyz/mass', {
        headers: {
            "X-Token": "davina",
        },
    });

    const data = await response.json();

    console.log(data.name);      // 'Massachusetts'
    console.log(data.governor);  // 'Maura Healey'

        stateName.textContent = data.name;
        governor.textContent = `Governor: ${data.governor}`;
        townList.innerHTML = '';

    for (const town of data.data) {
    console.log(`${town.name}: pop ${town.population}`);

        const li = document.createElement('li');
        li.textContent = `${town.name}: pop ${town.population}`;
        townList.appendChild(li);
        }

        console.log(data.data.length);

        async function postMessage(text) {
        const response = await fetch('https://oim.108122.xyz/message', {
        method: 'POST',
        headers: {
      'Content-Type': 'application/json',
      'X-Token': 'davinadavina'  // your first name x2
    },
    body: JSON.stringify({ message: text })
  });
  const result = await response.json();
  console.log(result);
}

postMessage('Hello from Davina!');
  }
    btn.addEventListener('click', getRandomWord);
    showTowns();
</script>
</body>
</html>
