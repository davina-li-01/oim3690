<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Total Calculator</title>
  <link rel="stylesheet" href="css/simple-total.css" />
</head>
<body>
  <h1>Simple Total Calculator</h1>

  <label for="name">Name</label>
  <input id="name" type="text" placeholder="Enter your name" />

  <label for="price">Price</label>
  <input id="price" type="number" step="0.01" placeholder="Enter price" />

  <label for="tax">Tax (%)</label>
  <input id="tax" type="number" step="0.01" placeholder="Enter tax percent" />

  <button id="calculateBtn" type="button">Calculate Total</button>

  <p id="result">Hello ! Total: $ 0.00</p>

  <script>
    const nameInput = document.getElementById('name');
    const priceInput = document.getElementById('price');
    const taxInput = document.getElementById('tax');
    const result = document.getElementById('result');
    const calculateBtn = document.getElementById('calculateBtn');

    calculateBtn.addEventListener('click', () => {
      const name = nameInput.value.trim() || 'there';
      const price = parseFloat(priceInput.value) || 0;
      const taxPercent = parseFloat(taxInput.value) || 0;

      const total = price + (price * taxPercent / 100);

      result.textContent = `Hello ${name}! Total: $ ${total.toFixed(2)}`;
    });
  </script>
</body>
</html>
