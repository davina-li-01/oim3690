<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <textarea id="message"></textarea>
    <h1>Message Counter</h1>
    <p>characters: <span id="char-count">0</span></p>
    <p></p>This is a simple demo page to show how JavaScript can interact with HTML elements. Type in the textarea to see the character count update in real-time. Click on the heading to see an alert and change its color.</p>

    <script>
        const textarea = document.querySelector('#message');
        const charCount = document.querySelector('#char-count');

        charCount.style.display = "none";

        textarea.addEventListener('input', () => {
            charCount.textContent = textarea.value.length;
            console.log(`Current character count: ${textarea.value.length}`);
        });

        document.querySelector("h1").addEventListener('click', function () {
            alert("You clicked the heading!");
            document.querySelector("h1").style.color = "red";
            console.log("Button clicked! Heading color changed to red.");
        });
    </script>
</body>
</html>
