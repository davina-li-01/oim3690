<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Simple Todo App</title>
	<link rel="stylesheet" href="css/todo.css" />
</head>
<body>
	<main class="app">
		<h1>Todo App</h1>

		<div class="toolbar">
			<div class="view-switch" role="tablist" aria-label="Todo views">
				<button type="button" class="view-btn active" data-view="daily">Daily</button>
				<button type="button" class="view-btn" data-view="weekly">Weekly</button>
				<button type="button" class="view-btn" data-view="monthly">Monthly</button>
			</div>

			<label class="date-picker-label" for="todo-date">Date</label>
			<input id="todo-date" type="date" />
		</div>

		<form id="todo-form">
			<input id="todo-input" type="text" placeholder="Add a task..." required />
			<button type="submit">Add</button>
		</form>

		<p id="view-title" class="view-title"></p>
		<ul id="todo-list"></ul>
		<p id="empty-state" class="empty">No tasks in this view yet.</p>
	</main>

	<script src="js/todo.js"></script>
</body>
</html>
